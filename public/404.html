<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>灵敏度加满的 blog</title>
    <script type="text/javascript">
      var pathPrefix = '/my-blog-P5R';
      var l = window.location;

      if (l.pathname.indexOf(pathPrefix + '/article/') === 0) {
        var articleId = l.pathname.replace(pathPrefix + '/article/', '');
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            pathPrefix +
            '/?/article/' +
            articleId +
            (l.search ? '&' + l.search.slice(1) : '') +
            l.hash,
        );
      } else {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + pathPrefix + '/' + (l.search ? l.search : '') + l.hash,
        );
      }
    </script>
  </head>
  <body>
    <noscript>
      <h1>请启用 JavaScript 以查看此网站</h1>
      <p>这是一个 React 单页应用，需要 JavaScript 支持。</p>
    </noscript>
  </body>
</html>
